packages:
  - typescript/packages/*

# Do NOT add a `catalog:` here, and do not use `catalog:` / `workspace:` specifiers in any
# published package's package.json. We release with plain `npm publish`, and npm cannot resolve
# those pnpm-only protocols — they ship verbatim into the tarball and break every install with
# `EUNSUPPORTEDPROTOCOL`. Pin shared dependency versions directly in each package.json instead.

allowBuilds:
  esbuild: true
  unrs-resolver: true

# 7 days. Must match the closed-source ampersend monorepo so `effect` resolves
# to the same patch across the project-reference boundary (divergent copies
# break the `domain` build — Schema.* type identities don't match).
minimumReleaseAge: 10080

# Verify package integrity in content-addressable store
verifyStoreIntegrity: true

# Fail on incompatible Node version
engineStrict: false

# Error if deps are out of sync before running scripts
verifyDepsBeforeRun: error

# Use frozen lockfile when possible
preferFrozenLockfile: true

# Include tarball URLs in lockfile for auditing
lockfileIncludeTarballUrl: true

# Fail on missing or invalid peer dependencies
strictPeerDependencies: true

peerDependencyRules:
  allowedVersions:
    "xsschema@0.4.0-beta.5>effect": "4.0.0-beta.69"
